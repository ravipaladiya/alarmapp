name: Build APK and Send to Slack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: alarm-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Send Message to Slack
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ APK Build Succeeded! (${{ github.ref_name }})"
          else
            STATUS="❌ APK Build Failed! (${{ github.ref_name }}) — check ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$STATUS\"}" \
            "$SLACK_WEBHOOK_URL"
